<a href="/questions/question/{{ question.slug }}"><div class="rounded-xl border border-gray-200 overflow-hidden transition-transform duration-200 ease-out cursor-pointer w-80 bg-white">
                <canvas data-url="{{ question.file.url }}" class="pdf-canvas rounded-lg w-full h-52 object-cover"></canvas>

                <p class="mt-3 px-4 pt-3 text-sm font-semibold">
                    {{ question.school_name }} | <span class="text-red-700">{{ question.difficulty }}</span>
                </p>
                <h3 class="px-4 pt-3 mb-1 text-lg font-semibold text-gray-800">
                    {{ question.title }}
                </h3>
                <p class="text-sm truncate px-4 pb-6 text-gray-600 w-5/6">
                    {{ question.description|truncatechars:230 }}
                </p>
    </div></a>
